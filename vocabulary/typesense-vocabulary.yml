name: Typesense
description: >-
  Vocabulary and taxonomy for Typesense search engine concepts, API terms,
  and search technology terminology.
created: "2026-05-03"
modified: "2026-05-03"
tags:
  - Typesense
  - Search Engine
  - Full-Text Search
  - Vector Search

terms:

  # Core Concepts
  - term: Collection
    definition: >-
      A named group of related documents in Typesense, analogous to a
      database table. Each collection has a defined schema with typed fields.
    tags: [Data Model, Schema]

  - term: Document
    definition: >-
      A JSON record stored in a Typesense collection. Documents are indexed
      and made searchable according to the collection schema.
    tags: [Data Model]

  - term: Schema
    definition: >-
      The field definitions for a Typesense collection, specifying field names,
      types, and indexing behavior. Typesense supports auto-schema detection.
    tags: [Data Model, Configuration]

  - term: Alias
    definition: >-
      A virtual collection name that points to an actual collection. Aliases
      enable zero-downtime re-indexing by atomically swapping which collection
      the alias points to.
    tags: [Operations, Collections]

  # Search Features
  - term: Typo Tolerance
    definition: >-
      Typesense's built-in ability to match documents despite spelling errors
      or typos in the query. Controlled by the `num_typos` search parameter.
    tags: [Search, Features]

  - term: Faceting
    definition: >-
      Aggregating search results by field values to enable navigation by
      category. Fields must be declared with `facet: true` in the schema.
    tags: [Search, Navigation]

  - term: Filtering
    definition: >-
      Restricting search results using the `filter_by` parameter with
      comparison operators (`:=`, `:>`, `:<`, `:[]`) on indexed fields.
    tags: [Search, Query]

  - term: Sorting
    definition: >-
      Ordering search results by one or more fields using `sort_by`.
      Supports ascending/descending with `_text_match` relevance scoring.
    tags: [Search, Ranking]

  - term: Grouping
    definition: >-
      Collapsing multiple documents with the same value in a field into a
      single result group using `group_by`.
    tags: [Search, Aggregation]

  - term: Multi-Search
    definition: >-
      Sending multiple search queries across one or more collections in a
      single HTTP request via the `/multi_search` endpoint.
    tags: [Search, Performance]

  - term: Geo Search
    definition: >-
      Searching and filtering by geographic proximity using `geopoint` fields
      and `filter_by=location:(lat,lon,radius km)` syntax.
    tags: [Search, Location]

  # Vector Search
  - term: Vector Search
    definition: >-
      Searching by embedding vector proximity rather than keyword matching.
      Typesense supports dense vector fields and HNSW indexing.
    tags: [Vector Search, AI]

  - term: Hybrid Search
    definition: >-
      Combining keyword (BM25) and vector (semantic) search scores to
      improve relevance by merging both ranking signals.
    tags: [Vector Search, Relevance]

  - term: Embedding
    definition: >-
      A numerical vector representation of text or data generated by a
      machine learning model. Typesense can automatically generate embeddings
      via built-in model integrations.
    tags: [Vector Search, ML]

  - term: HNSW
    definition: >-
      Hierarchical Navigable Small World. The approximate nearest-neighbor
      algorithm used by Typesense to index and query vector fields efficiently.
    tags: [Vector Search, Algorithm]

  # Curation and Tuning
  - term: Curation Set
    definition: >-
      A set of rules that pin, hide, or boost specific documents in search
      results to override the default ranking algorithm.
    tags: [Search Tuning, Curation]

  - term: Synonym Set
    definition: >-
      A defined group of words treated as equivalent during search so that
      queries for one word also return results for synonymous terms.
    tags: [Search Tuning, Linguistics]

  - term: Stopwords
    definition: >-
      Common words removed from search queries before processing because
      they do not contribute meaningfully to results.
    tags: [Search Tuning, Linguistics]

  - term: Stemming
    definition: >-
      Reducing words to their root form so that queries match inflected
      variants (e.g., "running" matches "run", "runs").
    tags: [Search Tuning, Linguistics]

  - term: Preset
    definition: >-
      A saved, named set of search parameters that can be referenced by
      name in queries to avoid repeating complex parameter sets.
    tags: [Configuration, Reusability]

  # Analytics
  - term: Analytics Rule
    definition: >-
      A configured rule that aggregates search events (queries, clicks,
      conversions) into analytics counters for reporting and query suggestions.
    tags: [Analytics, Configuration]

  - term: Query Suggestions
    definition: >-
      Autocomplete suggestions powered by Typesense Analytics that surface
      popular queries from real user search activity.
    tags: [Analytics, UX]

  # Operations
  - term: API Key
    definition: >-
      A scoped authentication credential for the Typesense API. Keys can
      be restricted to specific collections and actions.
    tags: [Security, Authentication]

  - term: Snapshot
    definition: >-
      A point-in-time backup of all Typesense data written to disk, triggered
      via the `/operations/snapshot` endpoint.
    tags: [Operations, Backup]

  - term: RAFT
    definition: >-
      The distributed consensus protocol used by Typesense clusters for
      leader election and data replication across nodes.
    tags: [Operations, Distributed Systems]

  # Conversational Search
  - term: Conversational Search
    definition: >-
      AI-powered question answering over indexed data where users ask
      natural language questions and receive generated answers with citations.
    tags: [AI, RAG, Conversational]

  - term: RAG
    definition: >-
      Retrieval Augmented Generation. The pattern where search retrieves
      relevant documents and an LLM generates a response grounded in those
      results. Typesense implements this via the Conversational Search API.
    tags: [AI, LLM, Architecture]
