naftiko: "1.0.0-alpha1"

info:
  label: "Typesense Vector Search API"
  description: >-
    Typesense vector and hybrid search capabilities for semantic similarity
    search, combining dense vector embeddings with keyword search.
  tags:
    - Typesense
    - Vector Search
    - Semantic Search
    - Embeddings
    - Hybrid Search
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TYPESENSE_API_KEY: TYPESENSE_API_KEY
      TYPESENSE_HOST: TYPESENSE_HOST

capability:
  consumes:
    - type: http
      namespace: typesense-vector
      baseUri: "http://{{TYPESENSE_HOST}}:8108"
      description: "Typesense vector and hybrid search"
      authentication:
        type: apikey
        key: X-TYPESENSE-API-KEY
        value: "{{TYPESENSE_API_KEY}}"
        placement: header
      resources:
        - name: vector-search
          path: /collections/{collectionName}/documents/search
          description: "Vector and hybrid search queries"
          operations:
            - name: vector-search
              method: GET
              description: "Perform vector or hybrid search on a collection"
              inputParameters:
                - name: collectionName
                  in: path
                  type: string
                  required: true
                  description: "Collection name"
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Query text (use * for pure vector search)"
                - name: query_by
                  in: query
                  type: string
                  required: true
                  description: "Fields to search"
                - name: vector_query
                  in: query
                  type: string
                  required: false
                  description: "Vector query specification"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: multi-vector-search
          path: /multi_search
          description: "Multi-search with vector queries"
          operations:
            - name: multi-vector-search
              method: POST
              description: "Execute multiple vector search requests"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  searches: "{{tools.searches}}"

  exposes:
    - type: rest
      port: 8101
      namespace: typesense-vector-api
      resources:
        - path: /v1/vector-search
          name: vector-search
          description: "Vector search"
          operations:
            - method: GET
              name: vector-search
              description: "Perform vector similarity search"
              call: "typesense-vector.vector-search"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9101
      namespace: typesense-vector-mcp
      transport: http
      tools:
        - name: vector-search
          description: "Perform semantic vector similarity search in Typesense"
          hints:
            readOnly: true
            openWorld: true
          call: "typesense-vector.vector-search"
          outputParameters:
            - type: object
              mapping: "$."
        - name: multi-vector-search
          description: "Execute multiple vector searches simultaneously"
          hints:
            readOnly: true
            openWorld: true
          call: "typesense-vector.multi-vector-search"
          outputParameters:
            - type: object
              mapping: "$."
