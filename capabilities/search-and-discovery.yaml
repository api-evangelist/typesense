naftiko: 1.0.0-alpha2
info:
  label: Typesense Search and Discovery
  description: Unified search and discovery workflow combining Typesense full-text search, vector search, and conversational
    AI search. Used by application developers to deliver instant, relevant, and AI-powered search experiences.
  tags:
  - Typesense
  - Search
  - Discovery
  - Vector Search
  - AI Search
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TYPESENSE_API_KEY: TYPESENSE_API_KEY
    TYPESENSE_HOST: TYPESENSE_HOST
capability:
  consumes:
  - type: http
    namespace: typesense-search
    baseUri: http://{{TYPESENSE_HOST}}:8108
    description: Typesense search and collection management
    authentication:
      type: apikey
      key: X-TYPESENSE-API-KEY
      value: '{{TYPESENSE_API_KEY}}'
      placement: header
    resources:
    - name: collections
      path: /collections
      description: Collection management
      operations:
      - name: list-collections
        method: GET
        description: List all collections
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-collection
        method: POST
        description: Create a new collection
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            name: '{{tools.name}}'
            fields: '{{tools.fields}}'
            default_sorting_field: '{{tools.default_sorting_field}}'
    - name: collection
      path: /collections/{collectionName}
      description: Single collection operations
      operations:
      - name: get-collection
        method: GET
        description: Retrieve a collection by name
        inputParameters:
        - name: collectionName
          in: path
          type: string
          required: true
          description: Collection name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: delete-collection
        method: DELETE
        description: Delete a collection
        inputParameters:
        - name: collectionName
          in: path
          type: string
          required: true
          description: Collection name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: documents
      path: /collections/{collectionName}/documents
      description: Document indexing and management
      operations:
      - name: index-document
        method: POST
        description: Index a single document
        inputParameters:
        - name: collectionName
          in: path
          type: string
          required: true
          description: Collection name
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            document: '{{tools.document}}'
    - name: search
      path: /collections/{collectionName}/documents/search
      description: Search documents in a collection
      operations:
      - name: search-collection
        method: GET
        description: Search for documents in a collection
        inputParameters:
        - name: collectionName
          in: path
          type: string
          required: true
          description: Collection name
        - name: q
          in: query
          type: string
          required: true
          description: Search query
        - name: query_by
          in: query
          type: string
          required: true
          description: Comma-separated list of fields to search
        - name: filter_by
          in: query
          type: string
          required: false
          description: Filter conditions
        - name: sort_by
          in: query
          type: string
          required: false
          description: Sort field and direction
        - name: facet_by
          in: query
          type: string
          required: false
          description: Comma-separated facet fields
        - name: per_page
          in: query
          type: integer
          required: false
          description: Results per page
        - name: page
          in: query
          type: integer
          required: false
          description: Page number
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: multi-search
      path: /multi_search
      description: Search across multiple collections in one request
      operations:
      - name: multi-search
        method: POST
        description: Execute multiple searches in a single request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            searches: '{{tools.searches}}'
    - name: aliases
      path: /aliases
      description: Collection alias management
      operations:
      - name: list-aliases
        method: GET
        description: List all collection aliases
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: keys
      path: /keys
      description: API key management
      operations:
      - name: list-api-keys
        method: GET
        description: List all API keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-api-key
        method: POST
        description: Create a new API key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            description: '{{tools.description}}'
            actions: '{{tools.actions}}'
            collections: '{{tools.collections}}'
  - type: http
    namespace: typesense-vector
    baseUri: http://{{TYPESENSE_HOST}}:8108
    description: Typesense vector and hybrid search
    authentication:
      type: apikey
      key: X-TYPESENSE-API-KEY
      value: '{{TYPESENSE_API_KEY}}'
      placement: header
    resources:
    - name: vector-search
      path: /collections/{collectionName}/documents/search
      description: Vector and hybrid search queries
      operations:
      - name: vector-search
        method: GET
        description: Perform vector or hybrid search on a collection
        inputParameters:
        - name: collectionName
          in: path
          type: string
          required: true
          description: Collection name
        - name: q
          in: query
          type: string
          required: true
          description: Query text (use * for pure vector search)
        - name: query_by
          in: query
          type: string
          required: true
          description: Fields to search
        - name: vector_query
          in: query
          type: string
          required: false
          description: Vector query specification
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: multi-vector-search
      path: /multi_search
      description: Multi-search with vector queries
      operations:
      - name: multi-vector-search
        method: POST
        description: Execute multiple vector search requests
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            searches: '{{tools.searches}}'
  exposes:
  - type: rest
    port: 8080
    namespace: typesense-search-discovery-api
    description: Unified REST API for Typesense search and discovery.
    resources:
    - path: /v1/search
      name: search
      description: Full-text document search
      operations:
      - method: GET
        name: search-collection
        description: Search documents in a collection with faceting and filtering
        call: typesense-search.search-collection
        with:
          collectionName: rest.collection
          q: rest.q
          query_by: rest.query_by
          filter_by: rest.filter_by
          sort_by: rest.sort_by
          facet_by: rest.facet_by
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/multi-search
      name: multi-search
      description: Multi-collection search
      operations:
      - method: POST
        name: multi-search
        description: Execute multiple searches across collections
        call: typesense-search.multi-search
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/vector-search
      name: vector-search
      description: Semantic vector search
      operations:
      - method: GET
        name: vector-search
        description: Perform vector similarity search
        call: typesense-vector.vector-search
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/collections
      name: collections
      description: Collection management
      operations:
      - method: GET
        name: list-collections
        description: List all search collections
        call: typesense-search.list-collections
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-collection
        description: Create a new search collection
        call: typesense-search.create-collection
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: typesense-search-discovery-mcp
    transport: http
    description: MCP server for AI-assisted search and content discovery with Typesense.
    tools:
    - name: search-collection
      description: Search documents in a Typesense collection with full-text, filters, and facets
      hints:
        readOnly: true
        openWorld: true
      call: typesense-search.search-collection
      with:
        collectionName: tools.collection
        q: tools.q
        query_by: tools.query_by
        filter_by: tools.filter_by
        sort_by: tools.sort_by
        facet_by: tools.facet_by
      outputParameters:
      - type: object
        mapping: $.
    - name: multi-search
      description: Execute multiple Typesense searches across different collections in one request
      hints:
        readOnly: true
        openWorld: true
      call: typesense-search.multi-search
      outputParameters:
      - type: object
        mapping: $.
    - name: vector-search
      description: Perform semantic vector similarity search in Typesense
      hints:
        readOnly: true
        openWorld: true
      call: typesense-vector.vector-search
      outputParameters:
      - type: object
        mapping: $.
    - name: multi-vector-search
      description: Execute multiple vector searches simultaneously across Typesense collections
      hints:
        readOnly: true
        openWorld: true
      call: typesense-vector.multi-vector-search
      outputParameters:
      - type: object
        mapping: $.
    - name: list-collections
      description: List all Typesense search collections
      hints:
        readOnly: true
        openWorld: true
      call: typesense-search.list-collections
      outputParameters:
      - type: object
        mapping: $.
    - name: get-collection
      description: Get schema and statistics for a Typesense collection
      hints:
        readOnly: true
        openWorld: true
      call: typesense-search.get-collection
      with:
        collectionName: tools.collection
      outputParameters:
      - type: object
        mapping: $.
    - name: index-document
      description: Index a new document into a Typesense collection
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: typesense-search.index-document
      with:
        collectionName: tools.collection
      outputParameters:
      - type: object
        mapping: $.
    - name: create-collection
      description: Create a new Typesense collection with a defined schema
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: typesense-search.create-collection
      outputParameters:
      - type: object
        mapping: $.
