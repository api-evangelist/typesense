aid: typesense
url: https://raw.githubusercontent.com/api-evangelist/typesense/refs/heads/main/apis.yml
apis:
  - aid: typesense:search-api
    name: Typesense Search API
    tags:
      - Search
      - Full-Text Search
      - Typo Tolerance
      - Faceting
      - Filtering
      - Geo Search
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://typesense.org/docs/30.1/api/
    properties:
      - url: https://typesense.org/docs/30.1/api/
        type: Documentation
      - url: openapi/typesense-search-api-openapi.yml
        type: OpenAPI
    description: >-
      The Typesense Search API provides endpoints for creating and managing
      collections, indexing documents, and performing search queries. It supports
      typo-tolerant full-text search, faceted navigation, filtering, sorting, and
      geo-based search. The API allows federated search across multiple collections
      in a single request and supports grouping, pinning, and curating search results
      for fine-grained control over the search experience.
  - aid: typesense:vector-search-api
    name: Typesense Vector Search API
    tags:
      - Vector Search
      - Semantic Search
      - Embeddings
      - Machine Learning
      - Similarity Search
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://typesense.org/docs/guide/semantic-search.html
    properties:
      - url: https://typesense.org/docs/guide/semantic-search.html
        type: Documentation
      - url: openapi/typesense-vector-search-api-openapi.yml
        type: OpenAPI
    description: >-
      The Typesense Vector Search API enables nearest-neighbor search over
      embeddings generated by machine learning models. It supports semantic search,
      visual search, and recommendation use cases by indexing vector embeddings
      alongside structured data. Typesense can automatically generate embeddings
      using built-in models or integrate with external services like OpenAI, allowing
      developers to build hybrid search experiences that combine keyword and semantic
      search in a single query.
  - aid: typesense:conversational-search-api
    name: Typesense Conversational Search API
    tags:
      - Conversational Search
      - RAG
      - Question Answering
      - Natural Language
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://typesense.org/docs/guide/building-a-search-application.html
    properties:
      - url: https://typesense.org/docs/guide/building-a-search-application.html
        type: Documentation
      - url: openapi/typesense-conversational-search-api-openapi.yml
        type: OpenAPI
    description: >-
      The Typesense Conversational Search API provides built-in Retrieval Augmented
      Generation (RAG) capabilities that allow developers to send natural language
      questions and receive fully formed sentence responses. It combines Typesense
      search with large language models to generate contextual answers grounded in
      the indexed data. This API enables building conversational interfaces on top of
      existing search collections without requiring a separate RAG pipeline.
  - aid: typesense:analytics-api
    name: Typesense Analytics API
    tags:
      - Analytics
      - Search Analytics
      - Click Tracking
      - Query Analytics
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.example.com
    humanURL: https://typesense.org/docs/30.1/api/
    properties:
      - url: https://typesense.org/docs/30.1/api/
        type: Documentation
      - url: openapi/typesense-analytics-api-openapi.yml
        type: OpenAPI
    description: >-
      The Typesense Analytics API allows developers to track and analyze search
      behavior by recording click, conversion, and visit events. It provides
      endpoints for creating analytics rules, logging events with metadata tags, and
      retrieving popular queries and queries with no results. This data can be used
      to improve search relevance through query suggestions, curations, and
      understanding user search patterns.
  - aid: typesense:cloud-management-api
    name: Typesense Cloud Management API
    tags:
      - Cloud
      - Cluster Management
      - Infrastructure
      - Configuration
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://cloud.typesense.org/api/v1
    humanURL: https://typesense.org/docs/cloud-management-api/v1/cluster-management.html
    properties:
      - url: https://typesense.org/docs/cloud-management-api/v1/cluster-management.html
        type: Documentation
      - url: openapi/typesense-cloud-management-api-openapi.yml
        type: OpenAPI
    description: >-
      The Typesense Cloud Management API provides endpoints for provisioning and
      managing Typesense Cloud clusters programmatically. It supports creating,
      updating, and deleting clusters, managing cluster configuration parameters,
      and applying configuration changes. This API enables infrastructure automation
      for teams running Typesense on the managed cloud platform, with authentication
      handled through cloud management API keys.
