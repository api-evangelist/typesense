        '200':
          description: API statistics
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
components:
  securitySchemes:
    api_key_header:
      type: apiKey
      in: header
      name: X-TYPESENSE-API-KEY
      description: >-
        API key for authenticating requests to the Typesense server.
  parameters:
    collectionName:
      name: collectionName
      in: path
      required: true
      description: >-
        Name of the collection.
      schema:
        type: string
    documentId:
      name: documentId
      in: path
      required: true
      description: >-
        ID of the document.
      schema:
        type: string
    synonymSetName:
      name: synonymSetName
      in: path
      required: true
      description: >-
        Name of the synonym set.
      schema:
        type: string
    curationSetName:
      name: curationSetName
      in: path
      required: true
      description: >-
        Name of the curation set.
      schema:
        type: string
    itemId:
      name: itemId
      in: path
      required: true
      description: >-
        ID of the item within a set.
      schema:
        type: string
    keyId:
      name: keyId
      in: path
      required: true
      description: >-
        Numeric ID of the API key.
      schema:
        type: integer
        format: int64
    aliasName:
      name: aliasName
      in: path
      required: true
      description: >-
        Name of the collection alias.
      schema:
        type: string
    stopwordsSetId:
      name: setId
      in: path
      required: true
      description: >-
        ID of the stopwords set.
      schema:
        type: string
    presetId:
      name: presetId
      in: path
      required: true
      description: >-
        ID of the preset.
      schema:
        type: string
    dictionaryId:
      name: dictionaryId
      in: path
      required: true
      description: >-
        ID of the stemming dictionary.
      schema:
        type: string
  schemas:
    CollectionSchema:
      type: object
      required:
        - name
        - fields
      properties:
        name:
          type: string
          description: >-
            Name of the collection.
        fields:
          type: array
          description: >-
            Array of field definitions for the collection schema.
          items:
            $ref: '#/components/schemas/Field'
        default_sorting_field:
          type: string
          description: >-
            Name of the field to sort by when no sort_by parameter is specified.
        token_separators:
          type: array
          description: >-
            Characters to use as token separators in addition to whitespace.
          items:
            type: string
        symbols_to_index:
          type: array
          description: >-
            Characters that should be indexed as part of tokens.
          items:
            type: string
        enable_nested_fields:
          type: boolean
          description: >-
            Whether to enable indexing of nested object fields.
        synonym_sets:
          type: array
          description: >-
            List of synonym set names to attach to this collection.
          items:
            type: string
        voice_query_model:
          $ref: '#/components/schemas/VoiceQueryModelConfig'
        metadata:
          type: object
          description: >-
            Arbitrary metadata to store with the collection.
    CollectionUpdateSchema:
      type: object
      properties:
        fields:
          type: array
          description: >-
            Array of field definitions to add, modify, or drop.
          items:
            $ref: '#/components/schemas/Field'
        synonym_sets:
          type: array
          description: >-
            Updated list of synonym set names for this collection.
          items:
            type: string
        metadata:
          type: object
          description: >-
            Updated metadata for the collection.
    CollectionResponse:
      type: object
      properties:
        name:
          type: string
          description: >-
            Name of the collection.
        fields:
          type: array
          items:
            $ref: '#/components/schemas/Field'
        default_sorting_field:
          type: string
          description: >-
            Default sorting field for this collection.
        num_documents:
          type: integer
          format: int64
          description: >-
            Number of documents in the collection.
        created_at:
          type: integer
          format: int64
          description: >-
            Unix timestamp when the collection was created.
        token_separators:
          type: array
          items:
            type: string
        symbols_to_index:
          type: array
          items:
            type: string
        enable_nested_fields:
          type: boolean
          description: >-
            Whether nested field indexing is enabled.
    Field:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          description: >-
            Name of the field.
        type:
          type: string
          description: >-
            Data type of the field. Supported types include string, int32,
            int64, float, bool, string[], int32[], int64[], float[], bool[],
            auto, object, object[], geopoint, geopoint[], image.
          enum:
            - string
            - int32
            - int64
            - float
            - bool
            - string[]
            - int32[]
            - int64[]
            - float[]
            - bool[]
            - auto
            - object
            - object[]
            - geopoint
            - geopoint[]
            - image
        optional:
          type: boolean
          description: >-
            Whether this field is optional in documents.
        facet:
          type: boolean
          description: >-
            Whether this field can be used for faceting.
        index:
          type: boolean
          description: >-
            Whether this field should be indexed for search.
        sort:
          type: boolean
          description: >-
            Whether this field can be used for sorting.
        infix:
          type: boolean
          description: >-
            Whether infix search is enabled for this field.
        locale:
          type: string
          description: >-
            Locale for language-specific tokenization.
        reference:
          type: string
          description: >-
            Reference to a field in another collection for JOINs.
        num_dim:
          type: integer
          description: >-
            Number of dimensions for vector fields.
        store:
          type: boolean
          description: >-
            Whether to store the field value for retrieval.
        range_index:
          type: boolean
          description: >-
            Whether to build a range index for this field.
        stem:
          type: boolean
          description: >-
            Whether stemming is enabled for this field.
        stem_dictionary:
          type: string
          description: >-
            Name of the custom stemming dictionary to use.
        drop:
          type: boolean
          description: >-
            Whether to drop this field during a schema update.
        vec_dist:
          type: string
          description: >-
            Distance metric for vector fields.
          enum:
            - cosine
            - ip
        embed:
          type: object
          description: >-
            Embedding configuration for auto-generating vector embeddings.
          properties:
            from:
              type: array
              description: >-
                Field names to generate embeddings from.
              items:
                type: string
            model_config:
              type: object
              description: >-
                Model configuration for embedding generation.
              properties:
                model_name:
                  type: string
                  description: >-
                    Name of the embedding model.
                api_key:
                  type: string
                  description: >-
                    API key for external embedding services.
                url:
                  type: string
                  description: >-
                    URL of the embedding service.
    VoiceQueryModelConfig:
      type: object
      properties:
        model_name:
          type: string
          description: >-
            Name of the voice query model.
    SearchResult:
      type: object
      properties:
        facet_counts:
          type: array
          description: >-
            Facet value counts for the search results.
          items:
            $ref: '#/components/schemas/FacetCounts'
        found:
          type: integer
          description: >-
            Total number of documents matching the query.
        found_docs:
          type: integer
          description: >-
            Total number of documents found before grouping.
        search_time_ms:
          type: integer
          description: >-
            Time taken for the search in milliseconds.
        out_of:
          type: integer
          description: >-
            Total number of documents in the collection.
        search_cutoff:
          type: boolean
          description: >-
            Whether the search was cut off due to time limits.
        page:
          type: integer
          description: >-
            Current page number.
        hits:
          type: array
          description: >-
            Array of search result hits.
          items:
            $ref: '#/components/schemas/SearchResultHit'
        grouped_hits:
          type: array
          description: >-
            Array of grouped search result hits when group_by is used.
          items:
            $ref: '#/components/schemas/SearchGroupedHit'
        request_params:
          type: object
          description: >-
            Parameters used for the search request.
        conversation:
          type: object
          description: >-
            Conversational search response when conversation mode is enabled.
          properties:
            answer:
              type: string
              description: >-
                Generated answer from the conversation model.
            conversation_history:
              type: array
              description: >-
                History of the conversation.
              items:
                type: object
            conversation_id:
              type: string
              description: >-
                ID of the conversation for follow-up queries.
    SearchResultHit:
      type: object
      properties:
        document:
          type: object
          description: >-
            The matched document.
        highlights:
          type: array
          description: >-
            Array of field highlights with matched tokens.
          items:
            $ref: '#/components/schemas/SearchHighlight'
        highlight:
          type: object
          description: >-
            Structured highlight object with nested field support.
        text_match:
          type: integer
          format: int64
          description: >-
            Text match score for the hit.
        text_match_info:
          type: object
          description: >-
            Detailed text match scoring breakdown.
        geo_distance_meters:
          type: object
          description: >-
            Distance in meters from the search geo point.
        vector_distance:
          type: number
          format: float
          description: >-
            Distance from the query vector for vector searches.
        hybrid_search_info:
          type: object
          description: >-
            Information about hybrid keyword and vector search scoring.
    SearchGroupedHit:
      type: object
      properties:
        found:
          type: integer
          description: >-
            Number of hits in this group.
        group_key:
          type: array
          description: >-
            Values of the group_by field.
          items: {}
        hits:
          type: array
          description: >-
            Search hits within this group.
          items:
            $ref: '#/components/schemas/SearchResultHit'
    SearchHighlight:
      type: object
      properties:
        field:
          type: string
          description: >-
            Name of the highlighted field.
        snippet:
          type: string
          description: >-
            Highlighted snippet of the field value.
        snippets:
          type: array
          description: >-
            Array of highlighted snippets for array fields.
          items:
            type: string
        value:
          type: string
          description: >-
            Full highlighted field value.
        values:
          type: array
          description: >-
            Full highlighted values for array fields.
          items:
            type: string
        matched_tokens:
          type: array
          description: >-
            Tokens in the field that matched the query.
          items: {}
        indices:
          type: array
          description: >-
            Indices of matched values in array fields.
          items:
            type: integer
    FacetCounts:
      type: object
      properties:
        field_name:
          type: string
          description: >-
            Name of the faceted field.
        counts:
          type: array
          description: >-
            Array of facet value counts.
          items:
            type: object
            properties:
              count:
                type: integer
                description: >-
                  Number of documents with this facet value.
              highlighted:
                type: string
                description: >-
                  Highlighted facet value.
              value:
                type: string
                description: >-
                  Facet value.
        stats:
          type: object
          description: >-
            Statistics for numeric faceted fields.
          properties:
            min:
              type: number
            max:
              type: number
            sum:
              type: number
            avg:
              type: number
            total_values:
              type: integer
    MultiSearchParameters:
      type: object
      required:
        - collection
      properties:
        collection:
          type: string
          description: >-
            Name of the collection to search.
        q:
          type: string
          description: >-
            Search query string.
        query_by:
          type: string
          description: >-
            Comma-separated list of fields to search.
        filter_by:
          type: string
          description: >-
            Filter conditions.
        sort_by:
          type: string
          description: >-
            Sort conditions.
        facet_by:
          type: string
          description: >-
            Fields to facet on.
        page:
          type: integer
          description: >-
            Page number.
        per_page:
          type: integer
          description: >-
            Results per page.
        preset:
          type: string
          description: >-
            Name of a preset to apply.
    MultiSearchResult:
      type: object
      properties:
        results:
          type: array
          description: >-
            Array of search results, one per search request.
          items:
            $ref: '#/components/schemas/SearchResult'
        conversation:
          type: object
          description: >-
            Conversation context when conversational multi-search is used.
    SynonymSetSchema:
      type: object
      properties:
        name:
          type: string
          description: >-
            Name of the synonym set.
    SynonymSet:
      type: object
      properties:
        name:
          type: string
          description: >-
            Name of the synonym set.
    SynonymItemSchema:
      type: object
      properties:
        synonyms:
          type: array
          description: >-
            List of synonym terms that are interchangeable.
          items:
            type: string
        root:
          type: string
          description: >-
            Root term for one-way synonyms. When set, the synonyms list maps
            to this root term.
    SynonymItem:
      type: object
      properties:
        id:
          type: string
          description: >-
            ID of the synonym item.
        synonyms:
          type: array
          items:
            type: string
        root:
          type: string
          description: >-
            Root term for one-way synonyms.
    CurationSetSchema:
      type: object
      properties:
        name:
          type: string
          description: >-
            Name of the curation set.
    CurationSet:
      type: object
      properties:
        name:
          type: string
          description: >-
            Name of the curation set.
    CurationItemSchema:
      type: object
      properties:
        rule:
          type: object
          description: >-
            Match rule for triggering this curation.
          properties:
            query:
              type: string
              description: >-
                Query string to match.
            match:
              type: string
              description: >-
                Match type: exact or contains.
              enum:
                - exact
                - contains
        includes:
          type: array
          description: >-
            Documents to pin at specific positions.
          items:
            type: object
            properties:
              id:
                type: string
                description: >-
                  Document ID to include.
              position:
                type: integer
                description: >-
                  Position to pin the document at.
        excludes:
          type: array
          description: >-
            Documents to hide from results.
          items:
            type: object
            properties:
              id:
                type: string
                description: >-
                  Document ID to exclude.
    CurationItem:
      type: object
      properties:
        id:
          type: string
          description: >-
            ID of the curation item.
        rule:
          type: object
          properties:
            query:
              type: string
            match:
              type: string
        includes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              position:
                type: integer
        excludes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
    ApiKeySchema:
      type: object
      required:
        - description
        - actions
        - collections
      properties:
        value:
          type: string
          description: >-
            Custom API key value. If not provided, one is auto-generated.
        description:
          type: string
          description: >-
            Human-readable description of the key.
        actions:
          type: array
          description: >-
            Allowed actions for this key, such as documents:search,
            collections:create, or * for all.
          items:
            type: string
        collections:
          type: array
          description: >-
            Collections this key can access. Use * for all collections.
          items:
            type: string
        expires_at:
          type: integer
          format: int64
          description: >-
            Unix timestamp when this key expires. Set to 0 for no expiration.
    ApiKey:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: >-
            Numeric ID of the API key.
        value:
          type: string
          description: >-
            Full API key value. Only returned on creation.
        value_prefix:
          type: string
          description: >-
            First few characters of the key for identification.
        description:
          type: string
          description: >-
            Human-readable description.
        actions:
          type: array
          items:
            type: string
        collections:
          type: array
          items:
            type: string
        expires_at:
          type: integer
          format: int64
    ApiKeysResponse:
      type: object
      properties:
        keys:
          type: array
          description: >-
            Array of API key metadata.
          items:
            $ref: '#/components/schemas/ApiKey'
    CollectionAliasSchema:
      type: object
      required:
        - collection_name
      properties:
        collection_name:
          type: string
          description: >-
            Name of the collection this alias points to.
    CollectionAlias:
      type: object
      properties:
        name:
          type: string
          description: >-
            Alias name.
        collection_name:
          type: string
          description: >-
            Name of the target collection.
    CollectionAliasesResponse:
      type: object
      properties:
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/CollectionAlias'
    StopwordsSetUpsertSchema:
      type: object
      required:
        - stopwords
      properties:
        stopwords:
          type: array
          description: >-
            List of stopword strings.
          items:
            type: string
        locale:
          type: string
          description: >-
            Locale for the stopwords set.
    StopwordsSet:
      type: object
      properties:
        id:
          type: string
          description: >-
            ID of the stopwords set.
        stopwords:
          type: array
          items:
            type: string
        locale:
          type: string
    PresetUpsertSchema:
      type: object
      properties:
        value:
          type: object
          description: >-
            Search parameters to store in the preset.
    Preset:
      type: object
      properties:
        name:
          type: string
          description: >-
            Preset name.
        value:
          type: object
          description: >-
            Stored search parameters.
    StemmingDictionary:
      type: object
      properties:
        id:
          type: string
          description: >-
            Stemming dictionary ID.
        words:
          type: object
          description: >-
            Map of words to their stems.
          additionalProperties:
            type: string
    IndexAction:
      type: string
      description: >-
        Action to perform during document indexing.
      enum:
        - create
        - upsert
        - update
        - emplace
    DirtyValues:
      type: string
      description: >-
        Strategy for handling field values that do not match the schema type.
      enum:
        - coerce_or_reject
        - coerce_or_drop
        - drop
        - reject
    HealthStatus:
      type: object
      properties:
        ok:
          type: boolean
          description: >-
            Whether the server is healthy and ready to accept requests.
    SuccessStatus:
      type: object
      properties:
        success:
          type: boolean
          description: >-
            Whether the operation was successful.
    SchemaChangeStatus:
      type: object
      properties:
        collection:
          type: string
          description: >-
            Name of the collection being modified.
        validated_docs:
          type: integer
          description: >-
            Number of documents validated so far.
        altered_docs:
          type: integer
          description: >-
            Number of documents altered so far.
